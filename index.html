<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitcoin Portfolio Projection</title>
  <meta name="description" content="Interactive Bitcoin portfolio projector with customizable CAGR scenarios.">
  <meta name="lightning" content="lnurlp:hertrace563@walletofsatoshi.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/lightning.css">
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <h1 id="main-title">Bitcoin <span>Portfolio</span><br>Projection</h1>
      <p id="main-subtitle">CAGR individually adjustable &middot; 10 years</p>
    </div>
    <div class="header-right">
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="en" title="English"><img src="https://flagcdn.com/w40/gb.png" alt="EN" width="24" height="16"></button>
        <button class="lang-btn" data-lang="de" title="Deutsch"><img src="https://flagcdn.com/w40/de.png" alt="DE" width="24" height="16"></button>
        <button class="lang-btn" data-lang="es" title="Espa&ntilde;ol"><img src="https://flagcdn.com/w40/es.png" alt="ES" width="24" height="16"></button>
        <button class="lang-btn" data-lang="zh" title="&#20013;&#25991;"><img src="https://flagcdn.com/w40/cn.png" alt="ZH" width="24" height="16"></button>
        <button class="lang-btn" data-lang="ja" title="&#26085;&#26412;&#35486;"><img src="https://flagcdn.com/w40/jp.png" alt="JA" width="24" height="16"></button>
      </div>
      <div class="date-badge" id="date-badge"></div>
    </div>
  </header>

  <!-- MAIN GRID -->
  <div class="main-grid">
    <div class="left-panel">

      <!-- DYNAMIC ASSET CARDS -->
      <div id="asset-cards"></div>

      <!-- PRESETS -->
      <div class="panel">
        <div class="presets-label" id="presets-label"></div>
        <div class="preset-btns" id="preset-btns"></div>
      </div>

      <!-- YEARS CONTROL -->
      <div class="panel" id="years-control"></div>

      <!-- API SETTINGS -->
      <div class="panel settings-panel">
        <div class="presets-label" id="api-settings-label"></div>
        <div class="ac-edit-row">
          <label id="api-key-label"></label>
          <div class="settings-row">
            <input type="password" class="ac-edit-input" id="finnhub-key-input">
            <button class="settings-save-btn" id="save-api-key">OK</button>
          </div>
          <div class="settings-status" id="api-status"></div>
        </div>
      </div>

      <!-- TOTALS -->
      <div class="totals-box">
        <div class="currency-toggle">
          <button class="cur-btn active" id="btn-usd" data-cur="USD">USD $</button>
          <button class="cur-btn" id="btn-eur" data-cur="EUR">EUR &euro;</button>
        </div>
        <div class="totals-title" id="totals-title"></div>
        <div id="totals-rows"></div>
        <div class="grand-total">
          <span class="gt-label" id="gt-label"></span>
          <span class="gt-val" id="sum-total"></span>
        </div>
      </div>

    </div>

    <!-- RIGHT PANEL: CHART -->
    <div class="right-panel">
      <div class="section-title" id="chart-title"></div>
      <div class="chart-wrap">
        <canvas id="mainChart"></canvas>
      </div>
      <div class="milestones" id="milestones"></div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-section">
    <div class="section-title" id="table-title"></div>
    <table>
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="footnote" id="footnote"></div>
  </div>

  <!-- LIGHTNING TIP -->
  <footer class="lightning-section">
    <div class="lightning-inner">
      <div class="lightning-text">
        <span class="lightning-icon">&#9889;</span>
        <div>
          <h3 id="lightning-title"></h3>
          <p id="lightning-text"></p>
        </div>
      </div>
      <a href="lightning:hertrace563@walletofsatoshi.com" class="lightning-btn" id="lightning-tip-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        LIGHTNING TIP
      </a>
    </div>
  </footer>

</div>

<!-- LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<!-- APP SCRIPTS (load order matters) -->
<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/state.js"></script>
<script src="js/calc.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/chart.js"></script>
<script src="js/events.js"></script>
<script src="js/app.js"></script>
</body>
</html>
